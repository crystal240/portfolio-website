<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal's Portfolio</title>

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="/images/crystal.png"
    />

    <!-- Basic SEO -->
    <meta
      name="description"
      content="Crystal's portfolio showcasing books, merch, 3D work, and AIGC projects."
    />
    <meta name="author" content="Crystal" />
    <meta
      name="keywords"
      content="Crystal, portfolio, books, merch, 3D, AIGC, design, creative"
    />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Crystal's Portfolio" />
    <meta
      property="og:description"
      content="Explore Crystal's work across books, merchandise, 3D, and AI-generated content."
    />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:image" content="/images/crystal.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crystal's Portfolio" />
    <meta
      name="twitter:description"
      content="Explore Crystal's work across books, merchandise, 3D, and AI-generated content."
    />
    <meta name="twitter:image" content="/images/crystal.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
